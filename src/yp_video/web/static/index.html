<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YP Video Pipeline</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%232D5F3F'/%3E%3Ctext x='16' y='22' font-family='Archivo,Arial,sans-serif' font-size='13' font-weight='800' fill='%23E8B23A' text-anchor='middle'%3EYP%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // VolleyIQ design system — Pipeline workspace (dark, instrument-grade).
    // Brand green #2D5F3F · accent gold #E8B23A · iOS-native dark surfaces.
    // Token names stay stable so every page re-skins from this one config; the
    // borrowed Tailwind palettes (emerald/red/amber/sky/violet) are remapped to
    // the iOS semantic hues so existing utility classes stay on-brand.
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#2D5F3F', light: '#5BBF8A', dark: '#244D33', dim: 'rgba(45,95,63,0.15)' },
            accent: { DEFAULT: '#E8B23A', light: '#F3D275', dark: '#C8901A', dim: 'rgba(232,178,58,0.15)' },
            surface: { DEFAULT: '#000000', '50': '#0E0E10', '100': '#1C1C1E', '200': '#2C2C2E', '300': '#3A3A3C', '400': '#48484A' },
            'text-primary': '#FFFFFF',
            'text-secondary': 'rgba(235,235,245,0.62)',
            'text-muted': 'rgba(235,235,245,0.40)',
            border: { DEFAULT: 'rgba(84,84,88,0.45)', light: 'rgba(84,84,88,0.65)', bright: 'rgba(120,120,128,0.55)' },
            // iOS semantic palette (dark) mapped onto the borrowed Tailwind scales.
            emerald: { 200: '#A7E8C0', 300: '#5FD98C', 400: '#34C759', 500: '#34C759', 600: '#2D9A52' },
            red: { 300: '#FF8A80', 400: '#FF6B5E', 500: '#FF453A', 600: '#E0352B' },
            amber: { 100: '#F3D275', 200: '#F0C868', 300: '#ECBE4F', 400: '#E8B23A', 500: '#E8B23A' },
            sky: { 300: '#7DD3FC', 400: '#38BDF8', 500: '#38BDF8' },
            violet: { 300: '#A78BFA', 400: '#7B5FD4', 500: '#7B5FD4' },
            rose: { 400: '#FF6B5E', 500: '#FF453A' },
          },
          fontFamily: {
            heading: ['"Archivo"', 'system-ui', 'sans-serif'],
            body: ['"IBM Plex Sans"', 'system-ui', 'sans-serif'],
            mono: ['"IBM Plex Mono"', 'ui-monospace', 'monospace'],
          },
          keyframes: {
            'fade-in': { from: { opacity: '0', transform: 'translateY(6px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            'slide-in': { from: { opacity: '0', transform: 'translateX(12px)' }, to: { opacity: '1', transform: 'translateX(0)' } },
            'shimmer': { from: { backgroundPosition: '-200% 0' }, to: { backgroundPosition: '200% 0' } },
            'pulse-dot': { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0.4' } },
          },
          animation: {
            'fade-in': 'fade-in 0.3s ease-out',
            'slide-in': 'slide-in 0.25s ease-out',
            'shimmer': 'shimmer 2s linear infinite',
            'pulse-dot': 'pulse-dot 1.5s ease-in-out infinite',
          },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'IBM Plex Sans', system-ui, sans-serif; background: #000000; color: #FFFFFF; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }
    h1, h2, h3, h4, h5, h6 { font-family: 'Archivo', system-ui, sans-serif; letter-spacing: -0.02em; }
    /* Data role — numbers, times, coords, ids. Pages opt in with .font-mono / tabular-nums. */
    .tabular-nums { font-variant-numeric: tabular-nums; }

    :focus-visible { outline: 2px solid #2D5F3F; outline-offset: 2px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Sidebar ── */
    #sidebar {
      background: #161618;
      border-right: 1px solid rgba(84,84,88,0.45);
    }
    .sidebar-link {
      transition: all 150ms cubic-bezier(0.4,0,0.2,1);
      cursor: pointer;
      border-left: 2px solid transparent;
      position: relative;
    }
    .sidebar-link:hover {
      background: rgba(255,255,255,0.05);
      color: #FFFFFF;
    }
    .sidebar-link.active {
      background: linear-gradient(90deg, rgba(45,95,63,0.22) 0%, transparent 100%);
      border-left-color: #2D5F3F;
      color: #FFFFFF;
    }
    .sidebar-link.active svg { color: #5BBF8A; }

    /* ── Collapsible sidebar ── */
    /* When collapsed the sidebar is fully removed from the flex row, so
       #app (flex-1) expands to the full window width. The floating
       hamburger is the only way back. */
    body.sidebar-collapsed #sidebar { display: none; }
    #sidebar-toggle-show { display: none; }
    body.sidebar-collapsed #sidebar-toggle-show { display: inline-flex; }

    /* Pages cap their content at max-w-screen-2xl (~1536px) for readability
       on wide monitors. When the sidebar is collapsed the user wants the
       extra room, so lift the cap and let content fill the full width. */
    body.sidebar-collapsed .max-w-screen-2xl { max-width: none; }

    /* Video players (TAD Label / Rally Label / Cut — all ids end in -player) are
       height-capped at ~45-50vh so the editor fits one screen. When the
       sidebar is collapsed, give the video more vertical room too. */
    body.sidebar-collapsed video[id$="-player"] { max-height: 72vh; }

    /* ── Brand stripe on sidebar top (green → gold) ── */
    #sidebar::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #2D5F3F, #E8B23A);
      opacity: 0.85;
    }

    /* ── Main content ──
       One restrained radial wash (gold ~4% / blue ~10%) is the only
       background flourish; everything else is flat cool-black. */
    #app {
      background:
        radial-gradient(ellipse 80% 50% at 78% -8%, rgba(232,178,58,0.045) 0%, transparent 60%),
        radial-gradient(ellipse 70% 45% at 12% 0%, rgba(56,189,248,0.05) 0%, transparent 55%),
        #000000;
    }

    /* ── Page transitions ── */
    .page-enter {
      animation: fade-in 0.25s ease-out;
    }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(120,120,128,0.30); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(120,120,128,0.50); }

    /* ── Elevation utilities ──
       Flat is the default. The only genuinely elevated surface is the video
       console (--shadow-surface); these tints are restrained focus cues. */
    .glow-primary { box-shadow: 0 0 0 1px rgba(45,95,63,0.45); }
    .glow-accent  { box-shadow: 0 0 0 1px rgba(232,178,58,0.45); }
    .glow-green   { box-shadow: 0 0 0 1px rgba(52,199,89,0.45); }
    .glow-red     { box-shadow: 0 0 0 1px rgba(255,69,58,0.45); }

    /* ── Card surface ──
       iOS-native: solid #1C1C1E panel, hairline border, flat. Kept under the
       legacy .glass-card name so every card() call re-skins from here. */
    .glass-card {
      background: #1C1C1E;
      border: 1px solid rgba(84,84,88,0.45);
    }
    .glass-card:hover {
      border-color: rgba(84,84,88,0.65);
    }

    /* ── Shimmer effect for loading ── */
    .shimmer-bg {
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
    }
  </style>
</head>
<body class="flex h-screen overflow-hidden">

  <script>if(localStorage.getItem('sidebarCollapsed')==='1')document.body.classList.add('sidebar-collapsed');</script>
