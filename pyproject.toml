[project]
name = "yp-video"
version = "0.2.0"
description = "Volleyball video analysis pipeline: download, cut, detect, annotate, train, predict"
requires-python = ">=3.10"
dependencies = [
    "torch>=2.0.0",
    "torchvision>=0.15.0",
    "transformers>=4.40.0",
    "timm>=0.9.0",
    "einops>=0.7.0",
    "decord>=0.6.0",
    "opencv-python-headless>=4.8.0",
    "numpy>=1.24.0",
    "pillow>=10.0.0",
    "accelerate>=0.25.0",
    "packaging>=23.0",
    "ninja>=1.11.0",
    "requests>=2.31.0",
    "aiohttp>=3.9.0",
    "tqdm>=4.66.0",
    # YouTube download
    "yt-dlp>=2026.2.0",
    "yt-dlp-ejs>=0.4.0",
    # Cloud storage
    "boto3>=1.34.0",
    # Web application
    "fastapi>=0.110.0",
    "uvicorn>=0.27.0",
    "vllm>=0.17.0",
    # TAD dependencies
    "scipy>=1.10.0",
    "mmengine>=0.10.0",
    "mmcv>=2.0.0,<2.2.0",
    "mmaction2>=1.2.0",
    "pandas>=2.0.0",
]

[project.scripts]
# Web Dashboard
yp-app = "yp_video.web.app:run_server"
# Pipeline CLI (按使用順序)
yp-download = "yp_video.youtube.download:main"
yp-vlm-segment = "yp_video.core.vlm_segment:main"
yp-vlm-to-rally = "yp_video.tad.vlm_to_rally:main"
yp-tad-convert = "yp_video.tad.convert_annotations:main"
yp-tad-extract = "yp_video.tad.extract_features:main"
yp-tad-train = "yp_video.tad.train:main"
yp-tad-infer = "yp_video.tad.infer:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/yp_video"]

[dependency-groups]
dev = [
    "pyright>=1.1.408",
]
